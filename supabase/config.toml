# ============================================
# FINOTAUR SUPABASE FUNCTIONS CONFIG
# ============================================
# 
# verify_jwt = false → Public endpoint (webhooks, public APIs)
# verify_jwt = true  → Requires Supabase auth token
#
# ============================================

# ============================================
# 🔥 WEBHOOKS - MUST BE PUBLIC (no JWT)
# ============================================

[functions.whop-webhook]
enabled = true
verify_jwt = false  # ← CRITICAL: Whop doesn't send JWT!

[functions.stripe-webhook]
enabled = true
verify_jwt = false  # ← Webhooks don't send JWT

# ============================================
# 🔥 TRADOVATE FUNCTIONS — verify_jwt:false + in-function dual-auth (OQ-37+38, 2026-05-09)
# ============================================
# Cron sends sb_secret_* (not JWT format) → would 401 with verify_jwt:true.
# Frontend sends user JWT. Both validated by _shared/dualAuth.ts inside the function.

[functions.tradovate-sync]
enabled = true
verify_jwt = false  # ← OQ-37+38: dual-auth via _shared/dualAuth.ts

[functions.tradovate-auth]
enabled = true
verify_jwt = false  # ← OQ-37+38: dual-auth via _shared/dualAuth.ts

# ============================================
# 🔗 OAUTH BROKER FUNCTIONS — auth model is per-function (added 2026-07-22)
# ============================================
# oauth-callback / oauth-refresh / oauth-revoke are hit WITHOUT a Supabase JWT:
#   - oauth-callback  ← Tradovate redirects the browser here (no JWT possible).
#                       Auth = the HMAC-signed `state` token, verified in-function
#                       by _shared/oauth-state.ts (HMAC + DB row + TTL + single-use).
#   - oauth-refresh   ← cron / server-side token renewal (sb_secret_*, not JWT).
#   - oauth-revoke    ← server-side revoke.
# These MUST be verify_jwt:false or the gateway 401s (UNAUTHORIZED_NO_AUTH_HEADER)
# before the function body runs. Incident 2026-07-22: a redeploy reset oauth-callback
# to the true default → every broker connect broke at the callback. Pinned here so a
# future `supabase functions deploy` can never regress it again.
# oauth-start keeps verify_jwt:true — it is called from the logged-in frontend and
# needs the user's JWT to know who is connecting.

[functions.oauth-callback]
enabled = true
verify_jwt = false  # ← Tradovate browser redirect carries no JWT; state token is the auth gate

[functions.oauth-refresh]
enabled = true
verify_jwt = false  # ← server-side / cron token renewal (sb_secret_*, not JWT)

[functions.oauth-revoke]
enabled = true
verify_jwt = false  # ← server-side revoke

[functions.oauth-start]
enabled = true
verify_jwt = true   # ← called from the authenticated frontend; needs user JWT

# ============================================
# 🪙 EXCHANGE FUNCTIONS (crypto brokers) — verify_jwt:false + in-function dual-auth (S2, 2026-05-30)
# ============================================
# Same rationale as Tradovate: exchange-sync cron sends sb_secret_* (not JWT) → would 401 with verify_jwt:true.
# Frontend sends user JWT. Both validated by _shared/dualAuth.ts (authenticate) inside the function.
# exchange-connect rejects cron callers in-function and requires a user.

[functions.exchange-sync]
enabled = true
verify_jwt = false  # ← S2: dual-auth via _shared/dualAuth.ts (cron + user JWT)

[functions.exchange-connect]
enabled = true
verify_jwt = false  # ← S2: dual-auth via _shared/dualAuth.ts (user-only, rejects cron in-function)

# ============================================
# 🔒 CHECKOUT FUNCTIONS - Require Auth
# ============================================

[functions.create-whop-checkout]
enabled = true
verify_jwt = true  # User must be logged in to create checkout

