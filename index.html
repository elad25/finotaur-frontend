<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Finotaur — AI Trading Intelligence for Stocks, Options & Crypto</title>
    <meta name="description" content="Finotaur is the AI-powered trading intelligence platform for retail traders. Free AI stock analysis, options flow scanner, dark pool data, and institutional-grade research — Bloomberg Terminal quality at retail pricing." />
    <meta name="keywords" content="Finotaur, AI trading platform, stock analyzer, options flow scanner, dark pool, trading intelligence, AI stock analysis, retail trading, options trading, trading journal" />
    <meta name="author" content="Finotaur" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://www.finotaur.com/" />

    <!-- Theme & Mobile -->
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="application-name" content="Finotaur" />
    <meta name="apple-mobile-web-app-title" content="Finotaur" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon-64.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, Slack, Discord) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Finotaur" />
    <meta property="og:title" content="Finotaur — AI Trading Intelligence for Stocks, Options & Crypto" />
    <meta property="og:description" content="The AI-powered trading intelligence platform for retail traders. Free AI stock analysis, options flow, dark pool data, and institutional-grade research." />
    <meta property="og:url" content="https://www.finotaur.com/" />
    <meta property="og:image" content="https://www.finotaur.com/assets/logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Finotaur — Trading Intelligence Platform" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@finotaur" />
    <meta name="twitter:creator" content="@finotaur" />
    <meta name="twitter:title" content="Finotaur — AI Trading Intelligence for Stocks, Options & Crypto" />
    <meta name="twitter:description" content="The AI-powered trading intelligence platform for retail traders. Free AI stock analysis, options flow, dark pool data, and institutional-grade research." />
    <meta name="twitter:image" content="https://www.finotaur.com/assets/logo.png" />
    <meta name="twitter:image:alt" content="Finotaur — Trading Intelligence Platform" />

    <!-- Performance: single consolidated, non-blocking font request for all 5 used families.
         (Cinzel dropped — unused. Replaces the former CSS @import in globals.css + the inline
         @import in LandingPage.tsx, both of which blocked first paint.) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Finotaur",
      "alternateName": "Finotaur Trading Intelligence",
      "url": "https://www.finotaur.com",
      "logo": "https://www.finotaur.com/logo.png",
      "description": "AI-powered trading intelligence platform for retail traders, specializing in stocks, options, and crypto analysis.",
      "sameAs": []
    }
    </script>

    <!-- JSON-LD: WebSite (enables sitelinks search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Finotaur",
      "url": "https://www.finotaur.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.finotaur.com/app/stocks/overview?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Finotaur",
      "applicationCategory": "FinanceApplication",
      "applicationSubCategory": "Trading Intelligence Platform",
      "operatingSystem": "Web",
      "url": "https://www.finotaur.com",
      "description": "AI trading intelligence platform with free unlimited AI stock analysis, options flow scanner, dark pool data, and institutional-grade research.",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "USD",
          "description": "Free AI Stock Analyzer, Top Movers, Earnings Calendar, Watchlists, Crypto, News"
        },
        {
          "@type": "Offer",
          "name": "Pro",
          "price": "59",
          "priceCurrency": "USD",
          "description": "AI Sector, Macro, Earnings analysis, Options Suite, Flow Scanner, Dark Pool Scanner, Trading Journal"
        },
        {
          "@type": "Offer",
          "name": "Finotaur",
          "price": "109",
          "priceCurrency": "USD",
          "description": "Everything in Pro plus TOP SECRET & WAR ZONE Newsletters, AI Top 5, AI Options Intelligence, AI Copilot, Block Trades, Trade Copier"
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
