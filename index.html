    <!-- Self-healing chunk recovery (runs before the module entry; classic script so it
         ALWAYS executes even when every hashed chunk fails). Core failure mode: after a
         deploy, or during Cloudflare Pages' 20-40 min propagation window, an edge that does
         not yet have /assets/<hash>.js returns a 404 (or the SPA shell) for it. When the
         FAILING chunk is a core vendor bundle (vendor-react / vendor-data), main.tsx never
         runs, so lazyWithRetry (which lives inside the app) cannot help — this script is the
         only recovery. It escalates: up to 3 cache-busting reloads inside a 90s window, then
         a terminal fallback UI with a manual Refresh button instead of an infinite splash.
         A mount-timeout backstop shows the same fallback if React simply never paints. -->
    <script>
      (function () {
        try {
          var KEY = '__finotaur_chunk_reload';
          var WINDOW_MS = 90000;
          var MAX_ATTEMPTS = 3;
          var MOUNT_TIMEOUT_MS = 15000;

          function readState() {
            try {
              var s = JSON.parse(sessionStorage.getItem(KEY) || 'null');
              return { firstAt: Number((s && s.firstAt) || 0), attempts: Number((s && s.attempts) || 0) };
            } catch (_) { return { firstAt: 0, attempts: 0 }; }
          }

          function bustAssetCache(onDone) {
            var urls = [];
            try {
              var entries = performance.getEntriesByType('resource');
              for (var i = 0; i < entries.length; i++) {
                var n = entries[i].name;
                if (n && n.indexOf('/assets/') !== -1 && /\.(js|mjs|css)(\?|$)/.test(n)) urls.push(n);
              }
            } catch (_) {}
            if (!window.fetch || !urls.length) { onDone(); return; }
            var done = 0;
            function tick() { done++; if (done >= urls.length) onDone(); }
            for (var j = 0; j < urls.length; j++) {
              try { fetch(urls[j], { cache: 'reload' }).then(tick, tick); } catch (_) { tick(); }
            }
            setTimeout(onDone, 4000); // safety: reload even if some fetches hang
          }

          function showFallback() {
            try {
              if (window.__finotaur_boot_fallback) return;
              window.__finotaur_boot_fallback = true;
              var splash = document.getElementById('boot-splash');
              if (!splash || splash.className.indexOf('boot-splash--hide') !== -1) return;
              splash.removeAttribute('aria-hidden');
              var msg = document.createElement('div');
              msg.className = 'boot-splash__msg';
              msg.textContent = 'Updating the app… this can take a minute.';
              var btn = document.createElement('button');
              btn.type = 'button';
              btn.className = 'boot-splash__btn';
              btn.textContent = 'Refresh now';
              btn.onclick = function () {
                try {
                  btn.disabled = true;
                  btn.textContent = 'Refreshing…';
                  try { sessionStorage.removeItem(KEY); } catch (_) {}
                  bustAssetCache(function () { location.reload(); });
                } catch (_) { location.reload(); }
              };
              splash.appendChild(msg);
              splash.appendChild(btn);
            } catch (_) {}
          }

          function recover(badUrl) {
            var state = readState();
            var now = Date.now();
            if (!state.firstAt || now - state.firstAt > WINDOW_MS) { state = { firstAt: now, attempts: 0 }; }
            if (state.attempts >= MAX_ATTEMPTS) { showFallback(); return; } // tried enough — offer the button
            state.attempts += 1;
            try { sessionStorage.setItem(KEY, JSON.stringify(state)); } catch (_) {}
            // A plain reload cannot evict an `immutable`-cached entry, so force-revalidate the
            // failing URL first with { cache: 'reload' } — overwrites any poisoned entry with
            // what the edge now returns (the real chunk, or a clean 404 from functions/assets).
            function go() { location.reload(); }
            if (badUrl && window.fetch) {
              try { fetch(badUrl, { cache: 'reload' }).then(go, go); } catch (_) { go(); }
            } else {
              go();
            }
          }

          // Resource load errors (script/link) don't bubble — listen in the capture phase.
          window.addEventListener('error', function (e) {
            var t = e && e.target;
            if (!t || t === window) return;
            var tag = (t.tagName || '').toUpperCase();
            var url = t.src || t.href || '';
            if ((tag === 'SCRIPT' || tag === 'LINK') && url.indexOf('/assets/') !== -1) {
              recover(url);
            }
          }, true);

          // Vite raises this for failed lazy dynamic imports (payload.href = failed URL).
          window.addEventListener('vite:preloadError', function (e) {
            var u = (e && e.payload && (e.payload.href || e.payload.url)) || '';
            recover(u);
          }, true);

          // Backstop: if React never paints (boot-splash still visible), offer the manual
          // Refresh UI instead of an infinite spinner. Does NOT auto-reload, so a genuinely
          // slow-but-fine load is never interrupted — the button is opt-in.
          setTimeout(function () {
            var splash = document.getElementById('boot-splash');
            if (splash && splash.className.indexOf('boot-splash--hide') === -1) showFallback();
          }, MOUNT_TIMEOUT_MS);
        } catch (_) { /* never block boot */ }
      })();
    </script>

    <!-- Performance: fonts for all 5 site-wide families, loaded in two tiers.
         (Cinzel dropped — unused.)
         Tier 1 (render-blocking, below): only the families+weights the very
         first paint of the busiest route (the "/" landing page, via its
         above-the-fold Hero) actually needs — Inter, Outfit, Cormorant
         Garamond, JetBrains Mono — so first paint isn't held up by the two
         Playfair Display weight sets that "/" never renders (Playfair is
         only used on /blog, /glossary, /affiliate and WAR ZONE, which load
         it themselves via their own component-level @import).
         Tier 2 (async, further below): the full stylesheet (all 5 families,
         every weight used anywhere in the app), swapped in without blocking
         the first frame. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;500&display=swap" rel="stylesheet">

    <!-- Async full font stylesheet: standard preload+swap pattern, non-blocking. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    >
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    </noscript>

  <body>
    <div id="root"></div>
    <!-- Instant boot splash: paints immediately with zero JS/remote-font dependency, so a
         visitor never sees a blank dark screen while the bundle loads. Removed by main.tsx
         once React's first frame is painted. Kept as a SIBLING of #root so the prerender
         root-div replacement contract (scripts/seo/prerender.mjs) stays untouched. -->
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-splash__mark"></div>
      <div class="boot-splash__word">FINOTAUR</div>
    </div>
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: #0a0a0a;
        opacity: 1;
        transition: opacity 320ms ease;
      }
      #boot-splash.boot-splash--hide { opacity: 0; }
      .boot-splash__mark {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: conic-gradient(from 0deg, rgba(240, 199, 94, 0) 0deg, rgba(201, 166, 70, 0.15) 200deg, #c9a646 330deg, #f0c75e 360deg);
        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 0);
        mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 0);
        animation: boot-splash-spin 1.2s linear infinite;
        filter: drop-shadow(0 0 8px rgba(201, 166, 70, 0.4));
      }
      .boot-splash__word {
        font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.42em;
        text-indent: 0.42em;
        color: #c9a646;
        opacity: 0.85;
      }
      .boot-splash__msg {
        max-width: 300px;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 13px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.55);
        text-align: center;
        padding: 0 20px;
      }
      .boot-splash__btn {
        margin-top: 4px;
        padding: 10px 22px;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #0a0a0a;
        background: #c9a646;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
        transition: background 160ms ease;
      }
      .boot-splash__btn:hover { background: #f0c75e; }
      .boot-splash__btn:disabled { opacity: 0.6; cursor: default; }
      @keyframes boot-splash-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        .boot-splash__mark { animation: none; }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
