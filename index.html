    <!-- Self-healing chunk recovery (runs before the module entry; classic script so it
         always executes even when every hashed chunk fails). After a deploy, a returning
         tab may reference old /assets/*.js hashes that no longer exist; Cloudflare then
         serves the index.html shell (text/html) for them, so the module script fails with
         a MIME error and main.tsx never runs → infinite boot splash. We catch that failure
         and force ONE reload to fetch the fresh, no-cache shell (which points at the current
         hashes). A 12s sessionStorage guard prevents any reload loop during a real outage. -->
    <script>
      (function () {
        try {
          var KEY = '__finotaur_chunk_reload_at';
          function recover() {
            var last = parseInt(sessionStorage.getItem(KEY) || '0', 10);
            if (Date.now() - last < 12000) return; // reloaded very recently — don't loop
            sessionStorage.setItem(KEY, String(Date.now()));
            location.reload();
          }
          // Resource load errors (script/link) don't bubble — listen in the capture phase.
          window.addEventListener('error', function (e) {
            var t = e && e.target;
            if (!t || t === window) return;
            var tag = (t.tagName || '').toUpperCase();
            var url = t.src || t.href || '';
            if ((tag === 'SCRIPT' || tag === 'LINK') && url.indexOf('/assets/') !== -1) {
              recover();
            }
          }, true);
          // Vite raises this for failed lazy dynamic imports.
          window.addEventListener('vite:preloadError', function () { recover(); });
        } catch (_) { /* never block boot */ }
      })();
    </script>

  <body>
    <div id="root"></div>
    <!-- Instant boot splash: paints immediately with zero JS/remote-font dependency, so a
         visitor never sees a blank dark screen while the bundle loads. Removed by main.tsx
         once React's first frame is painted. Kept as a SIBLING of #root so the prerender
         root-div replacement contract (scripts/seo/prerender.mjs) stays untouched. -->
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-splash__mark"></div>
      <div class="boot-splash__word">FINOTAUR</div>
    </div>
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: #0a0a0a;
        opacity: 1;
        transition: opacity 320ms ease;
      }
      #boot-splash.boot-splash--hide { opacity: 0; }
      .boot-splash__mark {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: conic-gradient(from 0deg, rgba(240, 199, 94, 0) 0deg, rgba(201, 166, 70, 0.15) 200deg, #c9a646 330deg, #f0c75e 360deg);
        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 0);
        mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 0);
        animation: boot-splash-spin 1.2s linear infinite;
        filter: drop-shadow(0 0 8px rgba(201, 166, 70, 0.4));
      }
      .boot-splash__word {
        font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.42em;
        text-indent: 0.42em;
        color: #c9a646;
        opacity: 0.85;
      }
      @keyframes boot-splash-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        .boot-splash__mark { animation: none; }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
