name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: build (vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          # Must pass the assert-critical-env key-class guard (sb_publishable_ prefix)
          VITE_SUPABASE_ANON_KEY: sb_publishable_dummy_key_for_ci_build_only

  typecheck:
    name: typecheck (tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # OQ-69 (2026-05-12): typecheck is advisory until the pre-existing type
    # drift across BacktestImmersiveMode → ReplayChart → SymbolManager →
    # companyData (and the usePlan PlanType drift in OQ-74) gets a dedicated
    # cleanup session. Both `continue-on-error: true` AND `|| true` in the
    # step itself because GitHub still reports the *step's* conclusion as
    # failure even with continue-on-error — using `|| true` forces exit 0 so
    # the check is green. Vite build still strictly gates deploys; tsc here
    # is signal-only (annotations still post for visibility).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check (advisory)
        run: npm run typecheck || echo "::warning::tsc errors remain (OQ-69); advisory only, see workflow comment"

  # BLOCKING gate (unlike `typecheck` above, which is advisory for OQ-69).
  # Fails the build ONLY on undefined-identifier errors (TS2304/2552/2686/
  # 2693/18004) — the crash class that ships a guaranteed runtime
  # ReferenceError to production. Added after the 2026-05-30 FileBarChart
  # white-screen incident, where advisory tsc + name-blind esbuild let an
  # unimported identifier reach the prod bundle. See scripts/ci/crash-guard.mjs.
  crash-guard:
    name: crash-guard (undefined identifiers)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Crash guard (blocking)
        run: npm run typecheck:crash-guard

  # BLOCKING gate. Fails the build if any static client-side navigation
  # (navigate('/x'), <Navigate to>, <Link/NavLink to>, window.location.href)
  # points to a path with no matching <Route> in src/App.tsx — the in-app 404
  # class. Added after the 2026-06-18 OAuth /onboarding 404 (and a sweep that
  # found ~18 more dead links). Uses only Node built-ins, so no npm install.
  # See scripts/check-routes.mjs.
  route-guard:
    name: route-guard (dead links)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Route guard (blocking)
        run: node scripts/check-routes.mjs

  lint:
    name: lint (eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
