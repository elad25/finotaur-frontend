name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: build (vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: dummy_key_for_ci_build_only

  typecheck:
    name: typecheck (tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # OQ-69 (2026-05-12): typecheck job is in advisory mode until the
    # pre-existing type drift across BacktestImmersiveMode → ReplayChart →
    # SymbolManager → companyData (and the usePlan PlanType drift in
    # OQ-74) gets a dedicated cleanup session. Disabling continue-on-error
    # without that cleanup would block every PR. Vite build still strictly
    # gates deploys; tsc here is signal-only.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck

  lint:
    name: lint (eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
