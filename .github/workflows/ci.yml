name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: build (vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: dummy_key_for_ci_build_only

  typecheck:
    name: typecheck (tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # OQ-69 (2026-05-12): typecheck is advisory until the pre-existing type
    # drift across BacktestImmersiveMode → ReplayChart → SymbolManager →
    # companyData (and the usePlan PlanType drift in OQ-74) gets a dedicated
    # cleanup session. Both `continue-on-error: true` AND `|| true` in the
    # step itself because GitHub still reports the *step's* conclusion as
    # failure even with continue-on-error — using `|| true` forces exit 0 so
    # the check is green. Vite build still strictly gates deploys; tsc here
    # is signal-only (annotations still post for visibility).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check (advisory)
        run: npm run typecheck || echo "::warning::tsc errors remain (OQ-69); advisory only, see workflow comment"

  # BLOCKING gate (unlike `typecheck` above, which is advisory for OQ-69).
  # Fails the build ONLY on undefined-identifier errors (TS2304/2552/2686/
  # 2693/18004) — the crash class that ships a guaranteed runtime
  # ReferenceError to production. Added after the 2026-05-30 FileBarChart
  # white-screen incident, where advisory tsc + name-blind esbuild let an
  # unimported identifier reach the prod bundle. See scripts/ci/crash-guard.mjs.
  crash-guard:
    name: crash-guard (undefined identifiers)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Crash guard (blocking)
        run: npm run typecheck:crash-guard

  # BLOCKING gate. Fails the build if any static client-side navigation
  # (navigate('/x'), <Navigate to>, <Link/NavLink to>, window.location.href)
  # points to a path with no matching <Route> in src/App.tsx — the in-app 404
  # class. Added after the 2026-06-18 OAuth /onboarding 404 (and a sweep that
  # found ~18 more dead links). Uses only Node built-ins, so no npm install.
  # See scripts/check-routes.mjs.
  route-guard:
    name: route-guard (dead links)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Route guard (blocking)
        run: node scripts/check-routes.mjs

  # BLOCKING gate. Fails the build if any Radix <DialogContent> / <SheetContent>
  # / <AlertDialogContent> / <DrawerContent> renders without a matching title
  # (<DialogTitle>/<SheetTitle>/... — a sr-only title counts). That omission
  # makes Radix log "`DialogContent` requires a `DialogTitle`..." at runtime,
  # invisible to the vite build. Added after 2026-06-26, when the broker
  # bottom-Sheet + mobile sidebar Sheet shipped without a SheetTitle (PR #1036).
  # Uses only Node built-ins, so no npm install. See scripts/check-dialog-titles.mjs.
  # Opt out a false positive (title rendered by a child component) with a
  # `dialog-title-guard-ignore` comment in the file.
  dialog-guard:
    name: dialog-guard (missing dialog title)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Dialog title guard (blocking)
        run: node scripts/check-dialog-titles.mjs

  # dropdown-guard — native <select> dropdowns must never render white-on-white.
  # Enforces the globals.css `select { color-scheme: dark }` iron rule.
  # See scripts/check-dropdown-theme.mjs.
  dropdown-guard:
    name: dropdown-guard (dark dropdowns)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Dropdown dark-theme guard (blocking)
        run: node scripts/check-dropdown-theme.mjs

  # 2026-07-02: this job was chronically cancelled by its own 10-minute
  # timeout (last several main runs + PR #1200 twice). Step timings showed
  # npm ci at ~20s (npm cache was fine) — the `eslint .` step alone ran past
  # 9m30s: single-threaded full-repo lint of ~2,090 TS/TSX files. Fix is
  # three-part: (1) `npm run lint` now runs eslint with --concurrency auto
  # (multi-core, eslint >=9.34) and --cache; (2) the .eslintcache file is
  # persisted across runs below, so warm runs re-lint only changed files;
  # (3) timeout raised to 20 as headroom for cold-cache runs — a run killed
  # by timeout skips post steps, so the cache would never populate at 10.
  lint:
    name: lint (eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      # Key ends in the run's SHA so every run saves a fresh cache; restore
      # falls back to the newest cache for the same deps + eslint config,
      # then to ANY eslint cache (PR branches can restore caches created by
      # main). The bare fallback is safe: ESLint's LintResultCache stores a
      # per-file config hash (config or eslint-version change ⇒ entries
      # self-invalidate and those files re-lint), so a stale cache degrades
      # to a partial re-lint, never to stale results. Measured cold run is
      # ~17m on the 4-core runner, so without the bare fallback every
      # package-lock bump would start from zero. --cache-strategy content
      # (set in the lint script) is what makes a restored cache valid here —
      # CI checkouts get fresh mtimes, so the default metadata strategy
      # would invalidate every entry.
      - name: Restore ESLint cache
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('package-lock.json', 'eslint.config.js') }}-${{ github.sha }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('package-lock.json', 'eslint.config.js') }}-
            eslint-${{ runner.os }}-
      - name: Lint
        run: npm run lint

  # BLOCKING gate. Runs the Vitest unit suite (vitest.config.ts → src/**/*.test.*).
  # Until 2026-06-30 the suite existed but no CI job ran it, so logic-only
  # regressions shipped unguarded — e.g. the copier micro+mini "double trade"
  # (one decision fanned to N accounts + translated mini→micro showed as 2 rows;
  # fixed in #1168/#1169 but with no test pinning it). See
  # src/lib/journal/positionGrouping.test.ts.
  test:
    name: test (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Unit tests (blocking)
        run: npm run test
